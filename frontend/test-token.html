<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Token测试</title>
</head>
<body>
    <h1>Token测试页面</h1>
    <button onclick="checkToken()">检查localStorage中的token</button>
    <button onclick="clearToken()">清除token</button>
    <button onclick="testLogin()">测试登录</button>
    <button onclick="testDashboard()">测试Dashboard</button>
    <pre id="result"></pre>

    <script>
        function checkToken() {
            const token = localStorage.getItem('token');
            document.getElementById('result').textContent = 'Token: ' + token;
        }

        function clearToken() {
            localStorage.removeItem('token');
            document.getElementById('result').textContent = 'Token已清除';
        }

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8084/admin/employee/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: '123456'
                    })
                });
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                if (data.code === 1 && data.data && data.data.token) {
                    localStorage.setItem('token', data.data.token);
                    document.getElementById('result').textContent += '\n\nToken已保存到localStorage';
                }
            } catch (error) {
                document.getElementById('result').textContent = '错误: ' + error.message;
            }
        }

        async function testDashboard() {
            const token = localStorage.getItem('token');
            document.getElementById('result').textContent = '发送的Token: ' + token + '\n\n';
            try {
                const response = await fetch('http://localhost:8084/admin/dashboard/stats', {
                    method: 'GET',
                    headers: {
                        'token': token
                    }
                });
                const data = await response.json();
                document.getElementById('result').textContent += JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent += '错误: ' + error.message;
            }
        }
    </script>
</body>
</html>
